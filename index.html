<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory | Altimus 15th & 16th</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Employee Directory</h1>
        <p>Search by name or department to find work stations and extensions.</p>
    </header>

    <main id="directory-app">
        <div class="search-container">
            <label for="search-input">Search:</label>
            <input type="text" id="search-input" placeholder="Type a name or department (e.g., IT)...">
        </div>

        <div id="results-container">
            <p class="loading">Loading directory...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
